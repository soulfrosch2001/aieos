name: Build installer

# On a version tag (v*), build the Windows (.exe) and macOS (.pkg) installers and attach
# them to the GitHub Release. Each bundles AIEOS and auto-configures it on install.
# Signing/notarization steps run only if the relevant secrets exist — see installer/signing.md.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build AIEOS.exe launcher (PS2EXE, no-console GUI subsystem)
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name ps2exe -Scope CurrentUser -Force -AllowClobber
          Import-Module ps2exe
          Invoke-ps2exe -inputFile installer\aieos-launcher.ps1 -outputFile installer\AIEOS.exe `
            -noConsole -iconFile installer\aieos.ico -title 'AIEOS' -product 'AIEOS' -company 'AIEOS' -STA
          if (-not (Test-Path installer\AIEOS.exe)) { throw "AIEOS.exe was not produced" }
          Get-Item installer\AIEOS.exe | Format-List Name,Length,LastWriteTime

      - name: Sign AIEOS.exe launcher (only if a code-signing cert is configured)
        if: ${{ env.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "aieos-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1).FullName
          & $signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd sha256 /tr http://timestamp.digicert.com /td sha256 installer\AIEOS.exe

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\aieos.iss
          Get-ChildItem installer\Output

      - name: Sign installer (only if a code-signing cert is configured)
        if: ${{ env.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "aieos-cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1).FullName
          Get-ChildItem installer\Output\*.exe | ForEach-Object {
            & $signtool sign /f $pfx /p $env:WINDOWS_CERT_PASSWORD /fd sha256 /tr http://timestamp.digicert.com /td sha256 $_.FullName
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIEOS-Windows-Installer
          path: installer/Output/*.exe

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe

  macos-installer:
    runs-on: macos-latest
    env:
      MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Build pkg
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash installer/macos/build-pkg.sh "${VERSION:-0.1.0}"
          ls installer/macos/Output

      - name: Sign & notarize (only if Apple credentials are configured)
        if: ${{ env.MACOS_CERT_BASE64 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/aieos.keychain-db"
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$MACOS_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/productsign
          security list-keychain -d user -s "$KEYCHAIN"
          IDENTITY=$(security find-identity -v "$KEYCHAIN" | grep "Developer ID Installer" | head -1 | awk '{print $2}')
          PKG=$(ls installer/macos/Output/*.pkg | head -1)
          productsign --sign "$IDENTITY" "$PKG" "${PKG%.pkg}-signed.pkg"
          mv "${PKG%.pkg}-signed.pkg" "$PKG"
          xcrun notarytool submit "$PKG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$PKG"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIEOS-macOS-Installer
          path: installer/macos/Output/*.pkg

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/macos/Output/*.pkg
