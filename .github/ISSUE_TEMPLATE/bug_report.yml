name: Bug report
description: Something in AIEOS behaves incorrectly — a rule, a script, the loader, or a documented behavior that doesn't hold.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. AIEOS is an operating system: precise, reproducible reports
        let us fix the root cause instead of guessing. If your report touches the kernel,
        a shared contract, or the standard library, the *fix* will still go through
        propose-before-build (Prime Directive #7) — but a bug report is the right place to start.

        Do **not** report a security vulnerability here. See SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, concise description of the incorrect behavior.
      placeholder: The links rule flagged a valid link to …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands or edits that trigger it. Minimal is best.
      placeholder: |
        1. Add file X under company Y
        2. Run `npm test`
        3. See error …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: npm-test
    attributes:
      label: "`npm test` output"
      description: Paste the relevant output from `npm test` (the conformance checker). Trim to the failing rules.
      render: text
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system and Node.js version (`node --version`).
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04 — Node v20.11.0"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — links to the affected company/entity, screenshots, related issues.
    validations:
      required: false
